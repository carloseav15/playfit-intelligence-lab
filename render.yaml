services:
  - type: web
    name: playfit-intelligence-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
